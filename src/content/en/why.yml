sectionTitle: "Why parents choose Baku"
cards:
  - illustration: "05-paper-airplane"
    illustrationAlt: "A cream-colored paper airplane gliding past a small amber moon."
    title: "Powered by Gemma 4 · 100% offline"
    body: "A 1.5 GB on-device language model runs entirely on your iPhone's neural engine. No cloud, no servers, no API calls. Airplane mode works forever."
  - illustration: "06-locked-chest"
    illustrationAlt: "A small wooden treasure chest with a brass padlock under amber starlight."
    title: "Zero data leaks · Zero tracking"
    body: "Your child's voice never leaves the device. No accounts, no analytics, no third-party SDKs, no advertising. The phone in your hand is the only place anything lives."
  - illustration: "07-child-with-teddy"
    illustrationAlt: "A child in cream pajamas walking toward a window with a teddy bear."
    title: "Safe for ages 3-7"
    body: "Every story passes a 12-language safety filter. No violence, no fear, no scary monsters. Every tale closes with a child falling asleep smiling."
  - illustration: "08-three-children"
    illustrationAlt: "Three children of different ethnicities sitting in a circle under a giant amber moon."
    title: "Three native languages"
    body: "English, Simplified Chinese, Spanish. Each language has its own voice and a separate library — never machine-translated."
