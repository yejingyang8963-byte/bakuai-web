sectionTitle: "What's inside"
anchorIllustration: "03-sleepy-dragon"
anchorIllustrationAlt: "A small friendly dragon curled up sleeping on a cream pillow under an amber moon."
features:
  - icon: "09-book-stars"
    iconAlt: "An open storybook with amber stars floating up from its pages."
    title: "AI bedtime stories"
    body: "A small on-device language model weaves a new story every night, guided by a single word your child whispers."
  - icon: "10-stack-books"
    iconAlt: "A leaning stack of children's picture books in cream, amber, and dusty blue."
    title: "264 hand-crafted preset stories"
    body: "When you don't want to wait. Each story illustrated and read in your child's chosen language."
  - icon: "11-meditation-child"
    iconAlt: "A small child in silhouette sitting cross-legged with a soft mist cloud rising from their breath."
    title: "Guided meditation & breathing"
    body: "10 short exercises to help wound-up children wind down."
  - icon: "12-cat-constellation"
    iconAlt: "A constellation in the night sky shaped like a sleeping curled-up cat."
    title: "Lullaby Sky"
    body: "A constellation of 10 classic lullabies, sung in three languages by Apple's premium voices."
  - icon: "13-rain-window"
    iconAlt: "Rain drops on a window seen from inside a cozy room with a teacup."
    title: "Ambient sounds"
    body: "Rain. Ocean. Forest. Crickets. Night wind. A music box. With a sleep timer."
