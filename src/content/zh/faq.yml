eyebrow: "还想问问"
sectionTitle: "诚实的回答。"
items:
  - question: "Baku 真的不联网也能用？"
    answer: "可以。装好之后，把手机调成飞行模式，Baku 用起来一模一样。Gemma 4 模型在你设备里。语音是 Apple 免费的自然语音，也在设备里。唯一的网络请求是 App Store 更新。"
  - question: "用的是什么模型？"
    answer: "Google Gemma 4（一个小的开源模型），量化并转成 Apple Core ML 格式，跑在 Neural Engine 上。iPhone 12 及更新机型上很流畅，老机型也能跑，只是慢一点。"
  - question: "孩子的数据会上传吗？"
    answer: "不会。没有分析 SDK，没有崩溃报告，没有埋点。名字、年龄、喜欢的主题、保存的故事都只在 app 本地沙盒里。除非你自己导出，否则永远不离开手机。"
  - question: "为什么是买断而不是订阅？"
    answer: "因为儿童内容的订阅，最后都会变成一种愧疚循环。一次买断，永久使用，未来的主题和语言更新也包含在内。哪怕将来 app 停更，它也还在你手机里。"
  - question: "故事是怎么保证安全的？"
    answer: "三层。第一，孩子不打字——只能从家长策划的愿望清单里点。第二，生成被限定在睡前主题（无惊悚、无死亡、无暴力）。第三，每一句在朗读前都会过一次 12 种语言的安全过滤。一旦命中，Baku 会安静地重写。"
  - question: "适合多大的孩子？"
    answer: "为 3–8 岁设计。小一点的孩子喜欢声音和节奏；大一点的喜欢具体的愿望（「一只叫匹普、喜欢芒果的友善的龙」）。支持英文、简体中文、西班牙语。"
  - question: "会有 Android 吗？"
    answer: "也许。先 iOS 是因为现在 Neural Engine 是设备端跑模型最稳的地方。如果足够多 Android 家长问起，我会移植——但绝不会发一个慢的。"
