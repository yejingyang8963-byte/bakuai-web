eyebrow: "走进 BAKU"
sectionTitle: "小小一个 app，认真做。"
anchorIllustration: "10-cabin-window"
anchorIllustrationAlt: "夜晚温暖灯光的小屋窗户"
features:
  - illustration: "11-icon-moon"
    illustrationAlt: "月亮图标"
    title: "三种语音，三种语言"
    body: "英文、简体中文、西班牙语——由 Apple 自然语音朗读，免费，本地。"
  - illustration: "12-icon-clock"
    illustrationAlt: "时钟图标"
    title: "睡眠定时 + 屏幕渐暗"
    body: "可选 5 / 8 / 12 分钟。屏幕缓缓变暗到近全黑，光不会吵到孩子。"
  - illustration: "13-icon-feather"
    illustrationAlt: "羽毛图标"
    title: "轻。280 MB"
    body: "老的 iPad mini 也能跑。模型经过量化，手机不会发热。"
  - illustration: "11-icon-moon"
    illustrationAlt: "月亮图标"
    title: "个性化只在本地"
    body: "名字、年龄、喜欢的主题。只存在手机上。不同步。一键清除。"
  - illustration: "12-icon-clock"
    illustrationAlt: "时钟图标"
    title: "保存或打印故事"
    body: "点一下保存。今晚的故事可以变成周六的睡前绘本。"
  - illustration: "13-icon-feather"
    illustrationAlt: "羽毛图标"
    title: "可访问性内置"
    body: "动态字号、VoiceOver、减少动效、更大的点击区——给孩子，也给大人。"
