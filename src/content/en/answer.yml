question: "What is Baku AI?"
answer: "Baku AI is an iPhone app that generates a different bedtime story every night, fully on-device with Google's Gemma 4 model. Choose a wish, tap once, and Baku reads in a soft voice for 5–8 minutes. There is no internet connection, no account, no advertising, no data collection. One purchase ($5.99), keep it forever."
