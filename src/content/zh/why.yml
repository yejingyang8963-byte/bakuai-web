sectionTitle: "为什么家长选择 Baku"
cards:
  - illustration: "05-paper-airplane"
    illustrationAlt: "一架奶白色的纸飞机滑过午夜天空，旁边是一颗小小的琥珀色月亮。"
    title: "真正的离线"
    body: "飞行模式可用。一直如此，永远如此。"
  - illustration: "06-locked-chest"
    illustrationAlt: "一个带黄铜小锁的木制宝箱，沐浴在柔和的琥珀色星光下。"
    title: "零数据收集"
    body: "没有账号、没有分析、没有广告。你手中的手机，是一切存在的唯一地方。"
  - illustration: "07-child-with-teddy"
    illustrationAlt: "穿着奶白色睡衣的孩子，怀抱一只棕色小熊，朝着窗边的月光走去。"
    title: "专为 3-7 岁打造"
    body: "故事温柔收尾。没有暴力，没有恐惧，没有可怕的怪物。每一个故事，都以一个孩子带着微笑入睡作为结局。"
  - illustration: "08-three-children"
    illustrationAlt: "三个不同肤色的孩子围坐在一片小山丘上，一颗巨大的琥珀色月亮在他们头顶。"
    title: "三种语言"
    body: "英语、简体中文、西班牙语。每种语言都有自己的声音——不是机器翻译。"
