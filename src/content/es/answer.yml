label: "RESPUESTA RÁPIDA"
question: "¿Qué es Baku AI?"
answer: "Baku AI es una app para iPhone que genera un cuento distinto cada noche, completamente en el dispositivo con el modelo Gemma 4 de Google. Elige un deseo, pulsa una vez y Baku lee con voz suave durante 5–8 minutos. Sin conexión, sin cuenta, sin publicidad, sin recolección de datos. Una compra ($5.99), tuyo para siempre."
