sectionTitle: "里面有什么"
anchorIllustration: "03-sleepy-dragon"
anchorIllustrationAlt: "一只温柔友善的小龙，蜷缩着在奶白色枕头上沉睡，琥珀色月光洒下。"
features:
  - icon: "09-book-stars"
    iconAlt: "一本翻开的故事书，琥珀色的小星星从书页中飘出。"
    title: "AI 睡前故事"
    body: "一个完全离线的小型语言模型，每晚根据孩子悄声说出的一个词，编织一个全新的故事。"
  - icon: "10-stack-books"
    iconAlt: "一摞略微倾斜的儿童画书，封面是奶白、琥珀、黯淡蓝色。"
    title: "264 个手写预设故事"
    body: "当你不想等待时使用。每一个故事都配有插图，并以你孩子选择的语言朗读。"
  - icon: "11-meditation-child"
    iconAlt: "一个小孩剪影盘腿坐在垫子上，呼吸中升起一朵柔软的薄雾云。"
    title: "引导冥想与呼吸"
    body: "10 段简短练习，帮助兴奋的孩子慢慢平静下来。"
  - icon: "12-cat-constellation"
    iconAlt: "夜空中由琥珀色星星连成的睡猫星座。"
    title: "摇篮曲星空"
    body: "一片由 10 首经典摇篮曲组成的星座，由苹果优质语音以三种语言演唱。"
  - icon: "13-rain-window"
    iconAlt: "从温暖房间内向外看，玻璃窗上沾着雨滴。"
    title: "环境音"
    body: "雨声、海浪、森林、虫鸣、夜风、八音盒。带睡眠定时器。"
