eyebrow: "WHY BAKU"
sectionTitle: "The bedtime app I wished\nexisted for my own daughter."
cards:
  - illustration: "06-tap-to-listen"
    illustrationAlt: "Hand tapping a glowing moon"
    title: "1 tap. No screen time."
    body: "Open. Pick a wish. Press play. The screen goes dark and Baku reads. Your child listens with eyes closed, the way bedtime stories were meant to be heard."
  - illustration: "07-no-wifi"
    illustrationAlt: "A house with a closed wifi symbol"
    title: "Truly offline. Truly private."
    body: "After the first launch, the AI runs entirely on your phone. No server, no cloud, no telemetry. On a plane, in a tent, at grandma's house — Baku still works."
  - illustration: "08-different-story"
    illustrationAlt: "An open book with different scenes flowing out"
    title: "A new story every night."
    body: "Same wish, fresh story. Baku composes a new tale on the spot from a thousand fairytale beats — so 'I want a dragon' tonight is not the dragon from yesterday."
  - illustration: "09-shield"
    illustrationAlt: "A shield with a heart inside"
    title: "Safe by construction."
    body: "12-language safety filter, parent-curated wish list, no chat input. There is no way for the model to be steered into something it shouldn't say. I built this for my own kid first."
