eyebrow: "AÚN CURIOSO"
sectionTitle: "Respuestas honestas."
items:
  - question: "¿Baku funciona sin internet de verdad?"
    answer: "Sí. Tras instalar, puedes poner el teléfono en modo avión y Baku se comporta igual. El modelo Gemma 4 vive en tu dispositivo. Las voces son las naturales gratuitas de Apple, también locales. La única conexión es la actualización en la App Store."
  - question: "¿Qué modelo usa?"
    answer: "Google Gemma 4 (un modelo abierto pequeño), cuantizado y convertido a Core ML para correr en el Neural Engine. Va fluido desde iPhone 12; en modelos más antiguos también funciona, pero más lento."
  - question: "¿Se sube alguna vez la información de mi hijo?"
    answer: "No. No hay SDK de analítica, ni reporte de errores, ni telemetría. Nombre, edad, temas favoritos y cuentos guardados viven en el sandbox local. Nunca salen del teléfono salvo que tú exportes un cuento."
  - question: "¿Por qué $5.99 en vez de suscripción?"
    answer: "Porque las suscripciones para niños se vuelven un bucle de culpa. Pagas una vez, lo conservas para siempre, incluidos los nuevos temas e idiomas. Aunque la app deje de mantenerse, sigue en tu teléfono."
  - question: "¿Cómo se mantiene la seguridad de los cuentos?"
    answer: "Tres capas. Los niños no escriben — sólo pulsan deseos curados por padres. La generación se limita a temas para dormir (sin terror, muerte ni violencia). Cada frase pasa un filtro de seguridad en 12 idiomas antes de leerse en voz alta; si algo se marca, Baku regenera silenciosamente."
  - question: "¿Para qué edades es?"
    answer: "Diseñada para 3–8. Los pequeños disfrutan la voz y el ritmo; los mayores disfrutan deseos específicos (\"un dragón amable llamado Pip al que le gusta el mango\"). Funciona en inglés, chino simplificado y español."
  - question: "¿Habrá versión Android?"
    answer: "Quizá. iOS primero porque el Neural Engine es hoy el sitio más estable para correr modelos en el dispositivo. Si suficientes padres de Android lo piden, la portaré — pero no lanzaré algo lento."
