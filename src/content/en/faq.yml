eyebrow: "STILL CURIOUS"
sectionTitle: "Honest answers."
items:
  - question: "Does Baku really work without internet?"
    answer: "Yes. After installing, you can put the phone in airplane mode and Baku runs exactly the same. The Gemma 4 model lives on your device. Voices are Apple's free natural voices, also on-device. The only network calls are App Store updates."
  - question: "What model does it run?"
    answer: "Google Gemma 4 (a small, open-weight model), quantised and converted to Apple's Core ML format so it can run on the Neural Engine. Runs comfortably on iPhone 12 and newer; works on older devices but more slowly."
  - question: "Is my child's data ever uploaded?"
    answer: "No. There is no analytics SDK, no crash reporter, no telemetry. Your child's name, age, favourite themes, and saved stories live in the app's local sandbox. They never leave the phone unless you explicitly export a story."
  - question: "Why $5.99 instead of a subscription?"
    answer: "Because subscriptions for kids' content turn into a guilt loop. Pay once, keep it forever, including all future story themes and language updates. If the app ever stops being maintained, you still have it."
  - question: "How are stories kept safe?"
    answer: "Three layers. First, kids never type — they only tap from a parent-curated wish list. Second, generation is constrained to bedtime themes (no horror, no death, no violence). Third, every sentence runs through a 12-language safety filter before being read aloud. If anything is flagged, Baku quietly regenerates."
  - question: "What ages is it for?"
    answer: "Designed for 3–8. Younger kids enjoy the voice and the rhythm; older kids enjoy specific wishes (\"a friendly dragon called Pip who likes mango\"). It works in English, Simplified Chinese, and Spanish."
  - question: "Will there be Android?"
    answer: "Maybe. iOS first because the Neural Engine is the easiest place to run on-device models well today. If enough Android parents ask, I'll port it — but I won't ship something slow."
