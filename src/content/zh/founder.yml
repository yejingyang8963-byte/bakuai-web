sectionTitle: 来自开发者的话
illustration: 02-founder-silhouette
illustrationAlt: 月光下书桌前的人物背影，只能看到剪影和正在笔记本上书写的双手。
nieceIllustration: 15-niece-reading
nieceIllustrationAlt: 一个梳着双辫子、穿着奶白色睡衣的小女孩，趴在床上读一本大画书。
paragraphs:
  - 我叫叶井阳，是一位在加州的伯伯。
  - 某天晚上，我侄女让我给她讲一个"困倦的小龙的故事"。我打开她 iPad 上每一个睡前 app，发现它们要么是广告漏斗，要么是注册表单，要么是内容分发管道。
  - 于是过去一年，我写了一个都不是的。
  - Baku 完全运行在你的 iPhone 里。讲故事的 AI 是一个 1.5 GB
    大小的小型语言模型。读故事的声音是苹果原生的。你的孩子可以说出最天马行空的想法，那段语音永远不会离开这台手机。
  - 我是一个人。没有团队，没有投资人，没有通往订阅深色模式的路线图。只有我，我的侄女，和一颗我为她画的月亮。
