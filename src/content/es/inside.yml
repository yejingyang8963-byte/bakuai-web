eyebrow: "POR DENTRO"
sectionTitle: "App pequeña. Hecha con cuidado."
anchorIllustration: "10-cabin-window"
anchorIllustrationAlt: "Ventana de cabaña iluminada por la noche"
features:
  - illustration: "11-icon-moon"
    illustrationAlt: "Icono luna"
    title: "Tres voces, tres idiomas"
    body: "Inglés, chino simplificado y español — leídos por las voces naturales de Apple, gratis, en el dispositivo."
  - illustration: "12-icon-clock"
    illustrationAlt: "Icono reloj"
    title: "Temporizador con atenuación"
    body: "5 / 8 / 12 min. La pantalla se atenúa casi a negro para que la luz no despierte al niño."
  - illustration: "13-icon-feather"
    illustrationAlt: "Icono pluma"
    title: "Ligero. 280 MB."
    body: "Un iPad mini viejo lo mueve. El modelo está cuantizado y el teléfono no se calienta."
  - illustration: "11-icon-moon"
    illustrationAlt: "Icono luna"
    title: "Personalización local"
    body: "Nombre, edad, temas favoritos. Solo en el teléfono. Nunca se sincroniza. Fácil de borrar."
  - illustration: "12-icon-clock"
    illustrationAlt: "Icono reloj"
    title: "Guarda o imprime un cuento"
    body: "Pulsa para guardarlo. El de esta noche puede ser el libro de mañana."
  - illustration: "13-icon-feather"
    illustrationAlt: "Icono pluma"
    title: "Accesibilidad incluida"
    body: "Dynamic Type, VoiceOver, reducir movimiento, áreas de toque grandes — para niños y adultos."
