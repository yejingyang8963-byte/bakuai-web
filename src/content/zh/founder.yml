eyebrow: "来自开发者"
illustration: "15-founder-portrait"
illustrationAlt: "夜晚窗边，父亲给小小的孩子念书"
paragraphs:
  - "我是 Jingyang。我每晚给我女儿念书。大概在第八十次重读同一本绘本之后，我开始想——是不是手机自己就能写一本新的？"
  - "然后我开始担心——大多数儿童 app 都会把一切偷偷送上云端，记录每一句指令，推送通知，想尽办法把孩子留在屏幕前。"
  - "我想要一个反过来的 app。点一下，听，睡。任何东西都不离开手机。没有订阅。没有套路。"
  - "于是我做了出来。现在它是我女儿最爱的 app，也是我最信任的那一个。"
