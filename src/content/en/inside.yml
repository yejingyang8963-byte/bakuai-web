eyebrow: "INSIDE BAKU"
sectionTitle: "Small app. Carefully made."
anchorIllustration: "10-cabin-window"
anchorIllustrationAlt: "A warmly-lit cabin window at night, signature Baku illustration style"
features:
  - illustration: "11-icon-moon"
    illustrationAlt: "Glowing moon icon"
    title: "Three voices, three languages"
    body: "English, Simplified Chinese, Spanish — read by Apple's natural voices, free, on-device."
  - illustration: "12-icon-clock"
    illustrationAlt: "Clock icon"
    title: "Sleep timer with screen-dim"
    body: "Set 5 / 8 / 12 min. The screen fades to almost-black so the light won't keep your child up."
  - illustration: "13-icon-feather"
    illustrationAlt: "Feather icon"
    title: "Light. 280 MB."
    body: "An old iPad mini handles it. The model is quantised so the phone does not get warm."
  - illustration: "11-icon-moon"
    illustrationAlt: "Moon icon"
    title: "Personalisation, kept local"
    body: "Name, age, favourite themes. Stored on the phone. Never synced. Easy to wipe."
  - illustration: "12-icon-clock"
    illustrationAlt: "Clock icon"
    title: "Print a story, save a story"
    body: "Tap a story to keep it. Tonight's tale becomes Saturday's bedtime book."
  - illustration: "13-icon-feather"
    illustrationAlt: "Feather icon"
    title: "Accessibility built-in"
    body: "Dynamic Type, VoiceOver labels, reduced motion, larger tap targets — for kids and grown-ups."
