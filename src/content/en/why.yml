sectionTitle: "Why parents choose Baku"
cards:
  - illustration: "05-paper-airplane"
    illustrationAlt: "A cream-colored paper airplane gliding past a small amber moon."
    title: "Truly offline"
    body: "Airplane mode works. Always has. Always will."
  - illustration: "06-locked-chest"
    illustrationAlt: "A small wooden treasure chest with a brass padlock under amber starlight."
    title: "Zero data collection"
    body: "No accounts, no analytics, no advertising. The phone in your hand is the only place anything lives."
  - illustration: "07-child-with-teddy"
    illustrationAlt: "A child in cream pajamas walking toward a window with a teddy bear."
    title: "Built for ages 3-7"
    body: "Stories end warmly. No violence, no fear, no scary monsters. Every tale closes with a child falling asleep smiling."
  - illustration: "08-three-children"
    illustrationAlt: "Three children of different ethnicities sitting in a circle under a giant amber moon."
    title: "Three languages"
    body: "English, Simplified Chinese, Spanish. Each language has its own voice — not machine-translated."
