eyebrow: "如何工作"
sectionTitle: "三步，故事开始。"
sub: "从许愿到第一句话不超过 5 秒。然后屏幕就会变暗，你可以把手机放下。"
steps:
  - n: "01"
    title: "选一个愿望"
    body: "从精选清单里挑——温柔的龙、迷路的月亮、奶奶的花园。也可以在设置里预先填好孩子的名字和喜好，Baku 会把它们织进故事里。"
  - n: "02"
    title: "Baku 创作"
    body: "Gemma 4 跑在 Neural Engine 上，在你手机里写一个 5–8 分钟的童话。没有服务器往返，不联网，连安全过滤都在本地完成。"
  - n: "03"
    title: "Baku 朗读"
    body: "Apple 自然语音轻声朗读，配合缓慢的翻页节奏。屏幕调到近全黑——不会把孩子吵醒。"
