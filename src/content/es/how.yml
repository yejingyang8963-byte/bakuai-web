eyebrow: "CÓMO FUNCIONA"
sectionTitle: "Tres toques y empieza."
sub: "Del deseo a la primera frase en menos de cinco segundos. Después la pantalla se oscurece y puedes dejar el teléfono."
steps:
  - n: "01"
    title: "Elige un deseo"
    body: "De una lista curada — un dragón amable, una luna perdida, el jardín de la abuela. También puedes anotar el nombre y los gustos de tu hijo en Ajustes y Baku los entreteje."
  - n: "02"
    title: "Baku compone"
    body: "Gemma 4 corre en el Neural Engine y escribe un cuento de 5–8 min en tu teléfono. Sin viaje al servidor. Sin internet. Hasta el filtro de seguridad es local."
  - n: "03"
    title: "Baku lee"
    body: "La voz natural de Apple narra suave mientras la página pasa despacio. La pantalla se atenúa casi a negro para no despertar al niño."
