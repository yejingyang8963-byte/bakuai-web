eyebrow: "为什么是 Baku"
sectionTitle: "我希望我女儿\n小时候就有的睡前 app。"
cards:
  - illustration: "06-tap-to-listen"
    illustrationAlt: "一只手轻触发光的月亮"
    title: "1 次点击 · 不看屏幕"
    body: "打开。选一个愿望。按播放。屏幕变暗，Baku 开始念。孩子可以闭上眼睛听——本来就该这样听故事。"
  - illustration: "07-no-wifi"
    illustrationAlt: "一座房子，旁边是关闭的 WiFi 标志"
    title: "真正离线，真正私密"
    body: "首次启动后，AI 完全跑在你的手机上。没有服务器，没有云，没有任何埋点。飞机上、帐篷里、奶奶家——Baku 都能用。"
  - illustration: "08-different-story"
    illustrationAlt: "一本翻开的书，不同场景流淌出来"
    title: "每晚都是新故事"
    body: "同一个愿望，每次都是新的故事。Baku 现场创作，糅合上千个童话节拍——所以今晚的「龙」不会是昨晚那条。"
  - illustration: "09-shield"
    illustrationAlt: "盾牌中间有一颗心"
    title: "从结构上就安全"
    body: "12 种语言的安全过滤，家长策划的愿望清单，不开放自由输入。模型不可能被引导说出不该说的话。我先给我自己的孩子做的。"
