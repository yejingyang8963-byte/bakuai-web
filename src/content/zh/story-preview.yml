sectionTitle: "看 Baku 怎么把愿望织成童话。"
sub: "在左边选一个愿望。下面是 Baku 在设备上现场写的、刚才读给你听的那一段。"
wishLabel: "今晚的愿望"
wishes:
  - "一只温柔的龙和迷路的月亮"
  - "奶奶午夜后的花园"
  - "茶杯海上的小小水手"
model: "Gemma 4 · 设备端"
status:
  - "听见愿望了…"
  - "正在编故事…"
  - "现在开始念"
story:
  -
    - "在叫做「快睡国」的、国境最安静的小山头上，住着一只小龙，名字叫匹普——绿得像一只茶杯，温得像一个口袋。"
    - "有一晚，月亮没有来。"
    - "匹普吐了三朵好奇的小烟，提起灯笼，给每一片影子带了一句温柔的话，就动身去找她。"
    - "他在一棵柳树里找到了她，月亮缠住了，有点不好意思，也有点困了。"
    - "他把她背回家，走得很慢，不想吵醒蟋蟀合唱团，于是「快睡国」终于睡着了。"
  -
    - "当时钟悄悄越过十二点，奶奶的西红柿开始低声哼唱。"
    - "豌豆挽起手臂，萝卜悄悄地鼓掌——怕被听见。"
    - "一个穿拖鞋的小女孩踮脚走出来，整座花园都鞠躬向她问好。"
    - "他们在月亮下办了一场小小的庆祝——三首歌，两支舞，一块派。"
    - "她回到床上，身上沾着一点星光，梦见了明年的夏天。"
  -
    - "在一只缺了口的蓝茶杯里，一个比顶针还矮的水手，正在调整他的纸帆。"
    - "今晚的碟子海很平静，一块方糖像冰山一样漂过。"
    - "他向一只蒸汽做的海豚和一只肉桂做的鲸鱼打招呼。"
    - "水壶鸣响时，他对着月亮抬了抬帽檐。"
    - "茶杯船长缓缓驶回港口，也驶回梦里。"
