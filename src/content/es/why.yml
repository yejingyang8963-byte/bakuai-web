eyebrow: "POR QUÉ BAKU"
sectionTitle: "La app de dormir que ojalá\nhubiera existido para mi hija."
cards:
  - illustration: "06-tap-to-listen"
    illustrationAlt: "Una mano toca una luna brillante"
    title: "1 toque. Sin pantalla."
    body: "Abre. Elige un deseo. Pulsa play. La pantalla se oscurece y Baku narra. Tu hijo escucha con los ojos cerrados, como debe ser un cuento de noche."
  - illustration: "07-no-wifi"
    illustrationAlt: "Una casa con un icono de wifi cerrado"
    title: "Realmente offline. Realmente privado."
    body: "Tras la primera apertura, la IA corre íntegramente en tu teléfono. Sin servidor, sin nube, sin telemetría. En un avión, en una tienda, en casa de la abuela — Baku funciona."
  - illustration: "08-different-story"
    illustrationAlt: "Un libro abierto del que fluyen distintas escenas"
    title: "Un cuento nuevo cada noche."
    body: "Mismo deseo, cuento fresco. Baku compone uno nuevo combinando mil compases de cuento — así el 'dragón' de hoy no es el de ayer."
  - illustration: "09-shield"
    illustrationAlt: "Un escudo con un corazón dentro"
    title: "Seguro por diseño."
    body: "Filtro de seguridad en 12 idiomas, lista de deseos curada por padres, sin entrada de chat. No hay forma de empujar al modelo a decir lo que no debe. Lo hice para mi propia hija primero."
