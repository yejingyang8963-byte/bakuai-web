label: "一句话回答"
question: "Baku AI 是什么？"
answer: "Baku AI 是一款 iPhone app，每晚生成一个不同的睡前故事，全程在设备上由 Google 的 Gemma 4 模型完成。选一个愿望，点一下，Baku 会用温柔的声音念 5–8 分钟。不联网，不需账号，无广告，无数据收集。一次买断 $5.99，永久使用。"
