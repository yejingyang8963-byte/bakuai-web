sectionTitle: "Frequently asked"
illustration: "14-teacup-book"
illustrationAlt: "A steaming teacup next to an open notebook on a wooden table at night."
items:
  - question: "Does it really work offline?"
    answer: "Yes. Once the language model is downloaded once (on the first run, with WiFi), the app never makes another network request. You can put your phone in Airplane Mode forever and Baku still works."
  - question: "Is it safe for my 4-year-old?"
    answer: "Stories are filtered through a 12-language safety system that blocks any violent, scary, or sad content before it ever reaches your child's ears. Parental approval is required before the AI mode can be unlocked."
  - question: "How does the AI work?"
    answer: "A small language model called Gemma 4 (about 1.5 GB) runs entirely on your iPhone's neural engine. It's the same kind of technology that powers ChatGPT, but smaller, simpler, and 100% local."
  - question: "What languages does it speak?"
    answer: "English, Simplified Chinese, and Spanish. Each language has its own dedicated voice and a separate library of preset stories — no machine translation."
  - question: "What's the price?"
    answer: "A one-time purchase of $5.99 unlocks everything forever. There is also a $0.99/month subscription if you prefer to pay slowly. The free version lets you try one AI story so you can hear the experience before buying. Either way: no ads, no in-app upgrades, no dark patterns."
  - question: "Who built this?"
    answer: "One person — me, Jingyang Ye, in California. There is no company, no investors, no team. Just an uncle and a moon."
