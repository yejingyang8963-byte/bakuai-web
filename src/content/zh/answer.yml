label: "一句话回答"
question: "Baku AI 是什么？"
answer: "Baku AI 是一款专为 3 到 8 岁儿童设计的 iPhone 睡前故事 app，每晚生成一个不同的童话，全程在设备上由 Google 的 Gemma 4 模型完成。选一个愿望，点一下，Baku 用温柔的声音念 5–8 分钟——支持英文、中文、西班牙语三语。屏幕自动变暗，让孩子闭上眼睛听。不联网，不需账号，无订阅，无广告，无数据收集——COPPA 和 GDPR-K 合规。内置摇篮曲、冥想引导和环境音效，全部包含。一次买断 $5.99，永久使用。可选 $0.99/月解锁「亲人之声」功能（用家长自己录制的声音念故事）。"
