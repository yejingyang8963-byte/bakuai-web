sectionTitle: "常见问题"
illustration: "14-teacup-book"
illustrationAlt: "一只冒着热气的茶杯旁边，木桌上放着一本翻开的笔记本。"
items:
  - question: "真的能完全离线运行吗？"
    answer: "能。语言模型只在第一次运行时联网下载一次（需要 WiFi），之后这个 app 永远不会再发出任何网络请求。你可以把手机一直锁在飞行模式，Baku 依然完整可用。"
  - question: "对 4 岁的孩子安全吗？"
    answer: "所有故事都经过一个 12 语言的内容安全过滤系统，任何暴力、恐怖、悲伤的内容都会在到达孩子耳朵之前被屏蔽。AI 模式必须经过家长验证才能解锁。"
  - question: "AI 是怎么工作的？"
    answer: "一个叫 Gemma 4 的小型语言模型（约 1.5 GB），完全运行在你 iPhone 的神经引擎上。它和 ChatGPT 是同一类技术，只是更小、更简单、100% 本地。"
  - question: "支持哪些语言？"
    answer: "英语、简体中文、西班牙语。每种语言都有专属的语音和独立的预设故事库——不是机器翻译。"
  - question: "定价是多少？"
    answer: "一次性买断 $5.99，解锁全部功能，永久使用。也有 $0.99/月 的订阅方案，如果你倾向慢慢付费。免费版可以试听 1 个 AI 故事，让你先感受体验再决定是否购买。无论哪种：零广告、零内购升级、零深色模式套路。"
  - question: "是谁做的？"
    answer: "一个人——我，叶经扬，在加州。没有公司、没有投资人、没有团队。只有一个伯伯和一颗月亮。"
